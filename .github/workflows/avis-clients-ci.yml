name: CI/CD Avis-Clients

# TP S14 — pipeline CI/CD du service Avis-Clients dans le monorepo FlexShop.
# Déclenchement AUTOMATIQUE à chaque push sur main touchant avis-clients/
# (ou le workflow lui-même). Lancement manuel aussi possible.
on:
  push:
    branches: [ main ]
    paths:
      - "avis-clients/**"
      - ".github/workflows/avis-clients-ci.yml"
  workflow_dispatch:

env:
  # ghcr exige un nom d'image en minuscules. Image nichée sous le monorepo :
  # ghcr.io/oasio/micro-service/avis-clients
  IMAGE_NAME: ghcr.io/${{ github.repository }}/avis-clients

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1 — TEST : PHPUnit sur une base SQLite jetable
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    container:
      image: php:8.3-cli
    defaults:
      run:
        working-directory: avis-clients
    env:
      APP_ENV: test
      # Surcharge la config MariaDB du .env.test : SQLite = pas de serveur à lancer en CI.
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data_test.db"
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système + extensions PHP
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            unzip git libicu-dev libzip-dev libsqlite3-dev
          docker-php-ext-install intl pdo_mysql pdo_sqlite zip

      - name: Installer Composer
        run: |
          curl -sS https://getcomposer.org/installer | php -- \
            --install-dir=/usr/local/bin --filename=composer

      - name: composer install
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Préparer la base de test SQLite
        run: php bin/console doctrine:schema:create --no-interaction

      - name: PHPUnit
        run: php bin/phpunit

  # ---------------------------------------------------------------------------
  # STAGE 2 — BUILD : construire l'image Docker (vérifie que le Dockerfile build)
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build -t avis-clients:${GITHUB_SHA::7} avis-clients
          docker images

  # ---------------------------------------------------------------------------
  # STAGE 3 — PACKAGE : push l'image au Container Registry GitHub (ghcr.io)
  # ---------------------------------------------------------------------------
  package:
    name: package
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login au GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build, tag et push (hash court + latest)
        run: |
          IMAGE=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          docker build -t "$IMAGE:${GITHUB_SHA::7}" -t "$IMAGE:latest" avis-clients
          docker push "$IMAGE:${GITHUB_SHA::7}"
          docker push "$IMAGE:latest"

  # ---------------------------------------------------------------------------
  # STAGE 4 (bonus) — DEPLOY : manuel, uniquement sur main. Déploiement simulé.
  # L'environnement "production" impose une approbation manuelle dans l'UI GitHub
  # (équivalent du "when: manual" de GitLab).
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    needs: package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Déploiement simulé
        run: |
          IMAGE=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "Déploiement de $IMAGE:latest"
          echo "Vers l'environnement de prod"
          echo "(simulé)"
