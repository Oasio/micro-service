# FlexShop — orchestration des 2 services communs (S8)
# 4 conteneurs (catalog + catalog-db, avis + avis-db), 1 réseau, 2 volumes.
# Un seul "docker compose up --build" démarre tout l'écosystème.

services:
  # --- Service Catalogue (Django) + sa base PostgreSQL ---
  catalog-db:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - catalog_data:/var/lib/postgresql/data
    networks: [flexshop-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  catalog:
    build: ./catalog-service
    environment:
      POSTGRES_HOST: catalog-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
      DJANGO_ALLOWED_HOSTS: "catalog,localhost,127.0.0.1"
    ports:
      - "8000:8000"          # navigateur -> http://localhost:8000
    depends_on:
      catalog-db:
        condition: service_healthy
    networks: [flexshop-net]

  # --- Service Avis-Clients (Symfony) + sa base MariaDB ---
  avis-db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: avis_clients
      MARIADB_ROOT_PASSWORD: ${AVIS_DB_PASSWORD}
    volumes:
      - avis_data:/var/lib/mysql
    networks: [flexshop-net]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  avis:
    build: ./avis-clients
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      # La base : nom du service Docker "avis-db", pas localhost.
      DATABASE_URL: "mysql://root:${AVIS_DB_PASSWORD}@avis-db:3306/avis_clients?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
      # Appel inter-services : nom du service Docker "catalog", pas localhost (S8 étape 5).
      CATALOGUE_BASE_URL: "http://catalog:8000"
    ports:
      - "8001:8000"          # navigateur -> http://localhost:8001
    depends_on:
      avis-db:
        condition: service_healthy
      catalog:
        condition: service_started
    networks: [flexshop-net]

volumes:
  catalog_data:               # persiste les données PostgreSQL
  avis_data:                  # persiste les données MariaDB

networks:
  flexshop-net:
    driver: bridge
